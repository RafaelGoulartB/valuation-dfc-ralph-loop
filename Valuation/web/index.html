<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valuation DCF</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --surface2:  #1f2937;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --blue:      #58a6ff;
      --green:     #3fb950;
      --red:       #f85149;
      --yellow:    #d29922;
      --purple:    #bc8cff;
      --radius:    8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo span { color: var(--blue); }
    #breadcrumb { display: flex; align-items: center; gap: 8px; }
    .back-link {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }
    .bc-sep { color: var(--border); }
    .bc-current { color: var(--text); font-size: 13px; font-weight: 500; }

    /* ── Main ────────────────────────────────────────────────────── */
    main { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

    /* ── Loading / Empty ─────────────────────────────────────────── */
    .loading, .empty {
      text-align: center;
      color: var(--muted);
      padding: 80px 0;
      font-size: 15px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── List view ───────────────────────────────────────────────── */
    .list-header { margin-bottom: 24px; }
    .list-header h1 { font-size: 22px; font-weight: 600; }
    .list-header p { color: var(--muted); margin-top: 4px; font-size: 13px; }

    .ticker-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .ticker-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: border-color 0.15s, transform 0.1s;
    }
    .ticker-card:hover {
      border-color: var(--blue);
      transform: translateY(-1px);
    }

    .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .ticker-badge {
      font-size: 16px; font-weight: 700; color: var(--blue);
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .upside-badge {
      font-size: 12px; font-weight: 600;
      padding: 3px 8px; border-radius: 12px;
    }
    .upside-badge.positive { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .upside-badge.negative { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .upside-badge.neutral  { background: rgba(139, 148, 158, 0.15); color: var(--muted); }

    .card-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .card-sector { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    .price-row {
      display: flex; gap: 24px; margin-bottom: 16px;
    }
    .price-item { }
    .price-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .price-value { font-size: 18px; font-weight: 700; margin-top: 2px; }
    .price-value.market { color: var(--text); }
    .price-value.intrinsic { color: var(--blue); }

    .pipeline-steps { display: flex; gap: 4px; }
    .pipeline-step {
      width: 28px; height: 6px; border-radius: 3px;
      background: var(--border);
    }
    .pipeline-step.done { background: var(--green); }
    .pipeline-step.partial { background: var(--yellow); }
    .pipeline-label { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Detail view ─────────────────────────────────────────────── */
    .detail-hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 28px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .hero-left { }
    .hero-company { font-size: 24px; font-weight: 700; }
    .hero-ticker {
      font-size: 14px; font-weight: 500;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--blue);
    }
    .hero-meta { color: var(--muted); font-size: 13px; margin-top: 4px; }

    .hero-right {
      display: flex; align-items: center; gap: 32px;
    }
    .hero-price { text-align: center; }
    .hero-price-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .hero-price-value { font-size: 28px; font-weight: 800; margin-top: 4px; }
    .hero-price-value.market { color: var(--text); }
    .hero-price-value.intrinsic { color: var(--blue); }
    .hero-vs { color: var(--border); font-size: 20px; font-weight: 300; }

    .hero-verdict {
      text-align: center;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 12px 20px;
      min-width: 140px;
    }
    .hero-verdict-pct { font-size: 26px; font-weight: 800; }
    .hero-verdict-pct.overvalued { color: var(--red); }
    .hero-verdict-pct.undervalued { color: var(--green); }
    .hero-verdict-label { font-size: 11px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ── Accordion ───────────────────────────────────────────────── */
    .accordion { display: flex; flex-direction: column; gap: 8px; }

    .acc-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .acc-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      color: var(--text);
    }
    .acc-header:hover { background: rgba(255,255,255,0.03); }

    .passo-num {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700;
      background: var(--surface2);
      color: var(--muted);
      flex-shrink: 0;
    }
    .passo-num.done { background: rgba(63,185,80,0.15); color: var(--green); }
    .passo-num.pending { background: rgba(139,148,158,0.08); color: var(--border); }

    .acc-title { font-size: 14px; font-weight: 600; flex: 1; }
    .acc-status { font-size: 12px; color: var(--muted); }
    .acc-chevron {
      color: var(--muted); font-size: 12px;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .acc-item.open .acc-chevron { transform: rotate(180deg); }

    .acc-body { display: none; padding: 0 20px 20px; }
    .acc-item.open .acc-body { display: block; }

    /* ── Tables ──────────────────────────────────────────────────── */
    .section-title {
      font-size: 12px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--muted);
      margin: 16px 0 8px;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 8px 12px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    td.field-name { color: var(--muted); font-size: 12px; white-space: nowrap; }
    td.val-num { font-weight: 600; text-align: right; white-space: nowrap; }
    td.val-pct { font-weight: 600; text-align: right; color: var(--blue); white-space: nowrap; }
    td.fonte { color: var(--muted); font-size: 11px; max-width: 300px; }

    .conf-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 4px;
      white-space: nowrap;
    }
    .conf-DIRETO   { background: rgba(63,185,80,0.12); color: var(--green); }
    .conf-CALCULADO{ background: rgba(88,166,255,0.12); color: var(--blue); }

    /* two-column section layout */
    .section-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 8px;
    }
    @media (max-width: 700px) { .section-grid { grid-template-columns: 1fr; } }
    .section-box {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 4px 0;
    }

    /* ── Premissas cards ─────────────────────────────────────────── */
    .premissas-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .premissa-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .premissa-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .premissa-val { font-size: 20px; font-weight: 700; color: var(--blue); }

    /* ── Narrative ────────────────────────────────────────────────── */
    .narrative-block {
      background: var(--surface2);
      border-left: 3px solid var(--blue);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 12px 16px;
      margin-bottom: 8px;
    }
    .narrative-title { font-size: 11px; font-weight: 600; color: var(--blue); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .narrative-text  { color: var(--muted); font-size: 13px; line-height: 1.6; }

    /* ── Checklist ────────────────────────────────────────────────── */
    .checklist { list-style: none; display: flex; flex-direction: column; gap: 4px; }
    .check-item {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 13px; padding: 6px 0;
      border-bottom: 1px solid rgba(48,54,61,0.4);
    }
    .check-item:last-child { border-bottom: none; }
    .check-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .check-ok    .check-icon { color: var(--green); }
    .check-fail  .check-icon { color: var(--red); }
    .check-info  .check-icon { color: var(--yellow); }
    .check-nome  { flex: 1; font-weight: 500; }
    .check-detalhe { color: var(--muted); font-size: 12px; margin-top: 1px; }

    /* ── Alert badges ──────────────────────────────────────────────── */
    .alert-box {
      background: rgba(210,153,34,0.1);
      border: 1px solid rgba(210,153,34,0.3);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      color: var(--yellow);
      margin-bottom: 8px;
    }
    .alert-box + .alert-box { margin-top: -2px; }

    /* ── DCF passo 4 ──────────────────────────────────────────────── */
    .kpi-row {
      display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .kpi-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      min-width: 120px;
    }
    .kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .kpi-val   { font-size: 20px; font-weight: 700; margin-top: 4px; }
    .kpi-val.blue   { color: var(--blue); }
    .kpi-val.green  { color: var(--green); }
    .kpi-val.purple { color: var(--purple); }

    /* FCF bar in table */
    .bar-cell { min-width: 80px; }
    .bar-wrap { display: flex; align-items: center; gap: 6px; }
    .bar-bg { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.3s; }

    /* Equity bridge */
    .bridge {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 16px;
    }
    .bridge-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(48,54,61,0.5);
      font-size: 13px;
    }
    .bridge-row:last-child { border-bottom: none; }
    .bridge-row.total {
      font-weight: 700; font-size: 15px;
      border-top: 2px solid var(--border);
      margin-top: 4px; padding-top: 12px;
    }
    .bridge-row.final {
      font-size: 18px; font-weight: 800; color: var(--blue);
      border-top: 2px solid var(--border);
      margin-top: 4px; padding-top: 12px;
    }
    .bridge-label { color: var(--muted); }
    .bridge-label.indent { padding-left: 16px; }
    .bridge-val { font-weight: 600; }
    .bridge-val.positive { color: var(--green); }
    .bridge-val.negative { color: var(--red); }

    /* ── Editable fields ──────────────────────────────────────────── */
    .editable-wrap {
      display: inline-flex; align-items: center; gap: 4px;
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 4px;
      margin: -1px -4px;
      transition: background 0.15s, box-shadow 0.2s;
    }
    .editable-wrap:hover { background: rgba(88,166,255,0.1); }
    .editable-wrap:hover .edit-btn { opacity: 1; }
    .editable-wrap.saved { box-shadow: 0 0 0 2px var(--green); }
    .editable-wrap.error { box-shadow: 0 0 0 2px var(--red); }

    .edit-btn {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 11px; padding: 0;
      opacity: 0; transition: opacity 0.15s;
      line-height: 1;
    }
    .edit-btn:hover { color: var(--blue); }

    .edit-input {
      background: var(--surface);
      border: 1px solid var(--blue);
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      padding: 2px 6px;
      outline: none;
      width: 100px;
    }

    .save-btn, .cancel-btn {
      border: none; border-radius: 4px;
      font-size: 13px; cursor: pointer;
      padding: 2px 7px; font-family: inherit;
    }
    .save-btn   { background: var(--green); color: #000; font-weight: 600; }
    .cancel-btn { background: var(--surface2); color: var(--muted); }

    /* ── Passo 5 ──────────────────────────────────────────────────── */
    .cenarios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) { .cenarios-grid { grid-template-columns: 1fr; } }
    .cenario-card {
      border-radius: var(--radius);
      padding: 16px 18px;
      border: 1px solid var(--border);
      text-align: center;
    }
    .cenario-card.bear   { background: rgba(248,81,73,0.07);  border-color: rgba(248,81,73,0.3); }
    .cenario-card.base   { background: rgba(88,166,255,0.07); border-color: rgba(88,166,255,0.3); }
    .cenario-card.bull   { background: rgba(63,185,80,0.07);  border-color: rgba(63,185,80,0.3); }
    .cenario-name  { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .cenario-card.bear .cenario-name  { color: var(--red); }
    .cenario-card.base .cenario-name  { color: var(--blue); }
    .cenario-card.bull .cenario-name  { color: var(--green); }
    .cenario-val   { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .cenario-card.bear .cenario-val   { color: var(--red); }
    .cenario-card.base .cenario-val   { color: var(--blue); }
    .cenario-card.bull .cenario-val   { color: var(--green); }
    .cenario-vs    { font-size: 12px; color: var(--muted); }
    .cenario-diff  { font-size: 13px; font-weight: 600; margin-top: 4px; }

    .breakeven-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .breakeven-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
    }
    .breakeven-card.highlight {
      border-color: var(--yellow);
      background: rgba(210,153,34,0.08);
    }
    .breakeven-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .breakeven-val   { font-size: 20px; font-weight: 700; color: var(--blue); }
    .breakeven-card.highlight .breakeven-val { color: var(--yellow); }
    .breakeven-badge { font-size: 10px; color: var(--yellow); font-weight: 600; margin-top: 4px; }

    .conclusao-box {
      background: var(--surface2);
      border-left: 3px solid var(--blue);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 14px 18px;
    }
    .conclusao-item {
      display: flex; gap: 10px; align-items: flex-start;
      padding: 6px 0;
      border-bottom: 1px solid rgba(48,54,61,0.4);
      font-size: 13px; line-height: 1.6; color: var(--muted);
    }
    .conclusao-item:last-child { border-bottom: none; }
    .conclusao-num { color: var(--blue); font-weight: 700; flex-shrink: 0; }

    /* ── Passo 5 pending ──────────────────────────────────────────── */
    .pending-box {
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
    }
    .pending-icon { font-size: 40px; margin-bottom: 12px; }
    .pending-title { font-size: 16px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .pending-sub   { font-size: 13px; }

    /* ── Tags / chips ──────────────────────────────────────────────── */
    .tag {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      padding: 2px 8px; border-radius: 20px;
    }
    .tag-ok   { background: rgba(63,185,80,0.12); color: var(--green); }
    .tag-fail { background: rgba(248,81,73,0.12); color: var(--red); }
    .tag-warn { background: rgba(210,153,34,0.12); color: var(--yellow); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ── Botão Recalcular DCF ─────────────────────────────────────── */
    .run-btn-row { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
    .run-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--blue); color: #0d1117;
      border: none; border-radius: var(--radius);
      padding: 8px 18px; font-size: 13px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .run-btn:hover:not(:disabled) { opacity: 0.85; }
    .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .run-status { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="logo">Valuation <span>DCF</span></div>
  <div id="breadcrumb"></div>
</header>

<main id="app">
  <div class="loading">
    <div class="spinner"></div>
    Carregando...
  </div>
</main>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
const S = {
  ticker: null,
  data: [null, null, null, null, null]  // passos[0..4]
};

// ─── Utilities ────────────────────────────────────────────────────────────────
const BRL = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const N2  = new Intl.NumberFormat('pt-BR', { minimumFractionDigits: 0, maximumFractionDigits: 2 });

function fBRL(v)  { return v == null ? '—' : 'R$ ' + BRL.format(v); }
function fM(v)    { return v == null ? '—' : N2.format(v); }
function fPct(v)  { return v == null ? '—' : (v * 100).toFixed(1) + '%'; }
function fPct2(v) { return v == null ? '—' : (v * 100).toFixed(2) + '%'; }
function fX(v)    { return v == null ? '—' : N2.format(v) + 'x'; }

function getDeep(obj, path) {
  return path.reduce((o, k) => (o != null ? o[k] : null), obj);
}
function setDeep(obj, path, val) {
  const last = path[path.length - 1];
  const parent = path.slice(0, -1).reduce((o, k) => o[k], obj);
  parent[last] = val;
}

function el(tag, cls, content) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (content !== undefined) e.innerHTML = content;
  return e;
}
function app() { return document.getElementById('app'); }

// ─── API ──────────────────────────────────────────────────────────────────────
async function fetchTickers() {
  const r = await fetch('/api/tickers');
  return r.json();
}

async function fetchPasso(ticker, n) {
  try {
    const r = await fetch(`/Acoes/${ticker}/passo${n}.json?_=${Date.now()}`);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function savePasso(ticker, n) {
  const data = S.data[n - 1];
  const r = await fetch(`/api/passo/${ticker}/${n}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  if (!r.ok) throw new Error('Falha ao salvar');
}

// ─── List view ────────────────────────────────────────────────────────────────
async function renderList() {
  setBreadcrumb(null);
  app().innerHTML = '<div class="loading"><div class="spinner"></div>Carregando empresas...</div>';

  let tickers;
  try { tickers = await fetchTickers(); }
  catch { app().innerHTML = '<div class="empty">Erro ao conectar ao servidor.</div>'; return; }

  if (!tickers.length) {
    app().innerHTML = '<div class="empty">Nenhuma empresa encontrada em Acoes/</div>';
    return;
  }

  // Carrega todos os 5 passos de cada ticker em paralelo
  const cards = await Promise.all(tickers.map(async t => {
    const passos = await Promise.all([1,2,3,4,5].map(n => fetchPasso(t, n)));
    return { ticker: t, passos };
  }));

  const frag = document.createDocumentFragment();
  const header = el('div', 'list-header');
  header.innerHTML = `<h1>Empresas analisadas</h1><p>${tickers.length} empresa${tickers.length !== 1 ? 's' : ''} encontrada${tickers.length !== 1 ? 's' : ''} em Acoes/</p>`;
  frag.appendChild(header);

  const grid = el('div', 'ticker-grid');
  for (const { ticker, passos } of cards) {
    grid.appendChild(buildCard(ticker, passos));
  }
  frag.appendChild(grid);

  app().innerHTML = '';
  app().appendChild(frag);
}

function buildCard(ticker, passos) {
  const [p1, p2, p3, p4, p5] = passos;
  const nome   = p1?.empresa?.nome   || ticker;
  const setor  = p1?.empresa?.setor  || '—';
  const pais   = p1?.empresa?.pais   || '';
  const precoM = p1?.mercado?.P?.valor ?? p4?.bloco_f?.P;
  const introV = p4?.bloco_f?.Valor_acao;

  let pct = null, cls = 'neutral', label = 'Sem valuation';
  if (precoM != null && introV != null) {
    pct = (precoM - introV) / introV;
    if (pct > 0.02)       { cls = 'negative'; label = '+' + fPct(pct) + ' prêmio'; }
    else if (pct < -0.02) { cls = 'positive'; label = fPct(pct) + ' desconto'; }
    else                  { cls = 'neutral';  label = 'Justo'; }
  }

  const done = passos.filter(Boolean).length;
  const stepsHtml = passos.map((p, i) =>
    `<div class="pipeline-step ${p ? 'done' : ''}"></div>`
  ).join('');

  const a = el('a', 'ticker-card');
  a.href = '#' + ticker;
  a.innerHTML = `
    <div class="card-top">
      <span class="ticker-badge">${ticker}</span>
      <span class="upside-badge ${cls}">${label}</span>
    </div>
    <div class="card-name">${nome}</div>
    <div class="card-sector">${setor}${pais ? ' · ' + pais : ''}</div>
    <div class="price-row">
      <div class="price-item">
        <div class="price-label">Mercado</div>
        <div class="price-value market">${precoM != null ? fBRL(precoM) : '—'}</div>
      </div>
      <div class="price-item">
        <div class="price-label">Intrínseco</div>
        <div class="price-value intrinsic">${introV != null ? fBRL(introV) : '—'}</div>
      </div>
    </div>
    <div class="pipeline-steps">${stepsHtml}</div>
    <div class="pipeline-label">Pipeline: ${done}/5 passos concluídos</div>
  `;
  return a;
}

// ─── Detail view ──────────────────────────────────────────────────────────────
async function renderDetail(ticker) {
  setBreadcrumb(ticker);
  app().innerHTML = '<div class="loading"><div class="spinner"></div>Carregando análise...</div>';

  S.ticker = ticker;
  const passos = await Promise.all([1,2,3,4,5].map(n => fetchPasso(ticker, n)));
  passos.forEach((d, i) => { S.data[i] = d; });

  const [p1, p2, p3, p4, p5] = passos;
  if (!p1 && !p2 && !p3 && !p4 && !p5) {
    app().innerHTML = `<div class="empty">Nenhum dado encontrado para ${ticker}</div>`;

  }

  const frag = document.createDocumentFragment();

    { n: 1, title: 'Extração do Release',      data: p1, fn: renderP1, open: true  },

function buildHero(ticker, p1, p4) {
  const nome   = p1?.empresa?.nome   || ticker;
  const setor  = p1?.empresa?.setor  || '';
  const pais   = p1?.empresa?.pais   || '';
  const precoM = p1?.mercado?.P?.valor ?? p4?.bloco_f?.P;
  const introV = p4?.bloco_f?.Valor_acao;

  let pct = null, cls = '', verdade = '—';
  if (precoM != null && introV != null) {
    pct = (precoM - introV) / introV;
    const pctAbs = Math.abs(pct * 100).toFixed(1);
    if (pct > 0.02)       { cls = 'overvalued';  verdade = `+${pctAbs}% premium`; }
    else if (pct < -0.02) { cls = 'undervalued'; verdade = `-${pctAbs}% desconto`; }
    else                  { cls = '';             verdade = 'Preço justo'; }
  }

  const div = el('div', 'detail-hero');
  div.innerHTML = `
    <div class="hero-left">
      <div class="hero-company">${nome} <span class="hero-ticker">${ticker}</span></div>
      <div class="hero-meta">${[setor, pais].filter(Boolean).join(' · ')}</div>
    </div>
    <div class="hero-right">
      ${precoM != null ? `
        <div class="hero-price">
          <div class="hero-price-label">Mercado</div>
          <div class="hero-price-value market">${fBRL(precoM)}</div>
        </div>
        <div class="hero-vs">vs</div>
        <div class="hero-price">
          <div class="hero-price-label">Intrínseco</div>
          <div class="hero-price-value intrinsic">${introV != null ? fBRL(introV) : '—'}</div>
        </div>
        ${pct != null ? `
          <div class="hero-verdict">
            <div class="hero-verdict-pct ${cls}">${verdade}</div>
            <div class="hero-verdict-label">${pct > 0.02 ? 'Sobreprecificado' : pct < -0.02 ? 'Subprecificado' : 'Avaliação'}</div>
          </div>
        ` : ''}
      ` : '<div class="hero-verdict"><div class="hero-verdict-label">Valuation não calculado</div></div>'}
    </div>
  `;
  return div;
}

function buildAccItem({ n, title, data, fn, open }) {
  const done = data != null;
  const item = el('div', 'acc-item' + (open && done ? ' open' : ''));

  const hdr = el('button', 'acc-header');
  hdr.innerHTML = `
    <span class="passo-num ${done ? 'done' : 'pending'}">${done ? '✓' : n}</span>
    <span class="acc-title">Passo ${n} — ${title}</span>
    <span class="acc-status">${done ? 'Concluído' : 'Pendente'}</span>
    <span class="acc-chevron">▼</span>
  `;
  hdr.onclick = () => {
    const isOpen = item.classList.contains('open');
    item.classList.toggle('open', !isOpen);
  };

  const body = el('div', 'acc-body');
  body.dataset.passoBody = n;
  if (done) {
    try { fn(body, data, n); }
    catch (e) { body.innerHTML = `<div class="empty">Erro ao renderizar: ${e.message}</div>`; }
  } else {
    body.innerHTML = `<div class="pending-box"><div class="pending-icon">⏳</div><div class="pending-title">Passo ${n} pendente</div><div class="pending-sub">Execute o pipeline para gerar este passo.</div></div>`;
  }

  item.appendChild(hdr);
  item.appendChild(body);
  return item;
}

// ─── Recalcular DCF ──────────────────────────────────────────────────────────
async function runPasso4() {
  const btn    = document.querySelector('.run-btn');
  const status = document.querySelector('.run-status');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Calculando...'; }
  if (status) status.textContent = 'Propagando passo 1 e 2 → passo 3 e rodando o script...';

  try {
    const resp = await fetch(`/api/run-passo4/${S.ticker}`, { method: 'POST' });
    const text = await resp.text();
    let data;
    try { data = JSON.parse(text); }
    catch { throw new Error(`Servidor retornou resposta inválida:\n${text.slice(0, 400)}`); }
    if (!data.ok) throw new Error(data.error || 'Erro desconhecido');

    S.data[3] = data.passo4;

    const body = document.querySelector('[data-passo-body="4"]');
    if (body) {
      body.innerHTML = '';
      renderP4(body, data.passo4);
      attachEditListeners();
    }

    refreshHero();
  } catch (e) {
    if (status) status.textContent = `Erro: ${e.message}`;
    if (btn) { btn.disabled = false; btn.textContent = '▶ Recalcular DCF'; }
  }
}

      <th style="text-align:right">Receita</th><th style="text-align:right">Margem</th>
      <th style="text-align:right">NOPAT</th><th style="text-align:right">FCFF</th>
      <th style="text-align:right">WACC</th><th>VP FCFF</th>
    </tr></thead><tbody>`;
  for (const r of bbc) {
    const barPct = (r.VP_FCFF / maxVP * 100).toFixed(1);
    tbl += `<tr>
      <td style="font-weight:600">${r.t}</td>
      <td class="val-pct">${fPct(r.g)}</td>
      <td class="val-num">${fM(r.Rev)}M</td>
      <td class="val-pct">${fPct(r.Mg)}</td>
      <td class="val-num">${fM(r.NOPAT)}M</td>
      <td class="val-num">${fM(r.FCFF)}M</td>
      <td class="val-pct">${fPct(r.WACC)}</td>
      <td class="bar-cell">
        <div class="bar-wrap">
          <div class="bar-bg"><div class="bar-fill" style="width:${barPct}%"></div></div>
          <span style="font-size:12px;font-weight:600;white-space:nowrap">${fM(r.VP_FCFF)}M</span>
        </div>
      </td>
    </tr>`;
  }
  tbl += '</tbody></table>';
  tw.innerHTML = tbl;
  container.appendChild(tw);

  // Bridge equity
  const st2 = el('div', 'section-title'); st2.textContent = 'Valor da Empresa → Preço por Ação';
  container.appendChild(st2);

  const bridge = el('div', 'bridge');
  const bridgeRows = [
    ['VP Fluxos (10 anos)', d.VP_total, false],
    ['+ Valor Terminal (VP)', bd.VP_VT, false],
    ['= Valor Operacional',  be.Valor_op, true],
    ['+ Caixa',              bf.Caixa,   false],
    ['+ Ativos Não-Op.',     bf.AtvNOp,  false],
    ['- Dívida Bruta',       -bf.D,      false],
    ['- Minority Interest',  bf.MinInt,  false],
    ['= Equity Value',       bf.Equity_Value, true],
  ];
  for (const [lbl, val, isTot] of bridgeRows) {
    const cls = isTot ? 'total' : '';
    const vcls = val >= 0 ? 'positive' : 'negative';
    bridge.innerHTML += `<div class="bridge-row ${cls}">
      <span class="bridge-label">${lbl}</span>
      <span class="bridge-val ${cls ? '' : vcls}">R$ ${fM(val)}M</span>
    </div>`;
  }
  bridge.innerHTML += `
    <div class="bridge-row" style="font-size:13px;color:var(--muted)">
      <span class="bridge-label indent">÷ ${fM(bf.Shares)}M ações</span>
      <span></span>
    </div>
    <div class="bridge-row final">
      <span>Valor / ação</span>
      <span>${fBRL(bf.Valor_acao)}</span>
    </div>
    <div class="bridge-row" style="border-top:none;padding-top:4px">
      <span class="bridge-label" style="font-size:12px">Preço de mercado</span>
      <span style="font-size:13px;color:var(--muted)">${fBRL(bf.P)}</span>
    </div>
  `;
  container.appendChild(bridge);

  // Checklist
  if (cl.length) {
    const st3 = el('div', 'section-title'); st3.textContent = 'Checklist de Validação';
    container.appendChild(st3);
    const list = el('ul', 'checklist');
    for (const item of cl) {
      const li = el('li', `check-item ${item.ok ? 'check-ok' : 'check-fail'}`);
      li.innerHTML = `
        <span class="check-icon">${item.ok ? '✓' : '✗'}</span>
        <div>
          <div class="check-nome">${item.nome}</div>
          <div class="check-detalhe">${item.detalhe}</div>
        </div>
      `;
      list.appendChild(li);
    }
    container.appendChild(list);
  }
}

// ─── Passo 5 — Sensibilidade ─────────────────────────────────────────────────
function renderP5(container, d) {
  if (!d) {
    container.innerHTML = `
      <div class="pending-box">
        <div class="pending-icon">📊</div>
        <div class="pending-title">Análise de sensibilidade pendente</div>
        <div class="pending-sub">Execute o pipeline com passo 5 para gerar os cenários.</div>
      </div>
    `;
    return;
  }

  const p5 = d.passo5 || d;
  const precoM = S.data[0]?.mercado?.P?.valor ?? S.data[3]?.bloco_f?.P;

  function diffBadge(intrinsic) {
    if (intrinsic == null || precoM == null) return '';
    const pct = (precoM - intrinsic) / Math.abs(intrinsic) * 100;
    const cls = pct > 2 ? 'color:var(--red)' : pct < -2 ? 'color:var(--green)' : 'color:var(--muted)';
    const sinal = pct > 0 ? '+' : '';
    return `<div class="cenario-diff" style="${cls}">${sinal}${pct.toFixed(1)}% vs mercado</div>`;
  }

  // ── Cenários
  const cenarios = [
    { cls: 'bear', nome: 'Bear',  val: p5.valor_acao_bear },
    { cls: 'base', nome: 'Base',  val: p5.valor_acao_base },
    { cls: 'bull', nome: 'Bull',  val: p5.valor_acao_bull },
  ];

  const st1 = el('div', 'section-title'); st1.textContent = 'Cenários de Valuation';
  container.appendChild(st1);

  const cGrid = el('div', 'cenarios-grid');
  for (const { cls, nome, val } of cenarios) {
    const isNeg = val != null && val < 0;
    cGrid.innerHTML += `
      <div class="cenario-card ${cls}">
        <div class="cenario-name">${nome}</div>
        <div class="cenario-val">${isNeg ? '-' : ''}${fBRL(Math.abs(val ?? 0))}</div>
        <div class="cenario-vs">vs mercado ${precoM != null ? fBRL(precoM) : '—'}</div>
        ${diffBadge(val)}
      </div>
    `;
  }
  container.appendChild(cGrid);

  // ── Breakeven
  const mais = p5.premissa_mais_sensivel;
  const beRows = [
    ['g Perpetuidade',  p5.g_perp_breakeven,   'g_perp_breakeven',   'pct'],
    ['WACC Estimado',   p5.WACC_est_breakeven,  'WACC_est_breakeven', 'pct'],
    ['Margem Alvo',     p5.Mg_alvo_breakeven,   'Mg_alvo_breakeven',  'pct'],
    ['g Anos 2-5',      p5.g2_5_breakeven,      'g2_5_breakeven',     'pct'],
  ];

  const st2 = el('div', 'section-title'); st2.textContent = 'Breakeven — valor necessário para justificar o preço atual';
  container.appendChild(st2);

  const bGrid = el('div', 'breakeven-grid');
  for (const [label, val, key, type] of beRows) {
    if (val == null) continue;
    const isMais = mais && key.startsWith(mais.replace('premissas_analiticas.', '').replace(/\..+/, ''));
    const formatted = type === 'pct' ? fPct2(val) : fM(val);
    bGrid.innerHTML += `
      <div class="breakeven-card ${isMais ? 'highlight' : ''}">
        <div class="breakeven-label">${label}</div>
        <div class="breakeven-val">${formatted}</div>
        ${isMais ? '<div class="breakeven-badge">⚡ Mais sensível</div>' : ''}
      </div>
    `;
  }
  container.appendChild(bGrid);

  // ── Conclusão
  if (p5.conclusao) {
    const st3 = el('div', 'section-title'); st3.textContent = 'Conclusão';
    container.appendChild(st3);

    const box = el('div', 'conclusao-box');
    const lines = p5.conclusao
      .split(/\n/)
      .map(l => l.trim())
      .filter(Boolean);

    for (const line of lines) {
      const match = line.match(/^(\d+)\.\s*(.+)$/);
      const item = el('div', 'conclusao-item');
      if (match) {
        item.innerHTML = `<span class="conclusao-num">${match[1]}.</span><span>${match[2]}</span>`;
      } else {
        item.innerHTML = `<span>${line}</span>`;
      }
      box.appendChild(item);
    }
    container.appendChild(box);
  }
}

// ─── Atualiza hero após edição ───────────────────────────────────────────────
function refreshHero() {
  const p1 = S.data[0];
  const p4 = S.data[3];
  const precoM = p1?.mercado?.P?.valor ?? p4?.bloco_f?.P;
  const introV = p4?.bloco_f?.Valor_acao;

  const mEl = document.querySelector('.hero-price-value.market');
  if (mEl && precoM != null) mEl.textContent = fBRL(precoM);

  const verdict = document.querySelector('.hero-verdict');
  if (!verdict || precoM == null || introV == null) return;
  const pct = (precoM - introV) / introV;
  const pctAbs = Math.abs(pct * 100).toFixed(1);
  const pctEl  = verdict.querySelector('.hero-verdict-pct');
  const lblEl  = verdict.querySelector('.hero-verdict-label');
  if (pctEl) {
    pctEl.className = 'hero-verdict-pct ' + (pct > 0.02 ? 'overvalued' : pct < -0.02 ? 'undervalued' : '');
    pctEl.textContent = pct > 0.02 ? `+${pctAbs}% premium` : pct < -0.02 ? `-${pctAbs}% desconto` : 'Preço justo';
  }
  if (lblEl) lblEl.textContent = pct > 0.02 ? 'Sobreprecificado' : pct < -0.02 ? 'Subprecificado' : 'Avaliação';
}

// ─── Edição inline ───────────────────────────────────────────────────────────
function attachEditListeners() {
  document.querySelectorAll('.editable-wrap').forEach(wrap => {
    const displayEl = wrap.querySelector('.ev');
    const editBtn   = wrap.querySelector('.edit-btn');
    if (!displayEl || !editBtn) return;

    const handler = () => openEdit(wrap, displayEl);
    displayEl.addEventListener('click', handler);
    editBtn.addEventListener('click', e => { e.stopPropagation(); openEdit(wrap, displayEl); });
  });
}

function openEdit(wrap, displayEl) {
  if (wrap.querySelector('.edit-input')) return; // já em edição

  const passoN = parseInt(wrap.dataset.passo);  // 1-5
  const path   = wrap.dataset.path.split('.');
  const type   = wrap.dataset.type || 'text';
  const rawVal = getDeep(S.data[passoN - 1], path);

  let inputVal;
  if (type === 'pct') {
    inputVal = (rawVal * 100).toFixed(4);
  } else {
    inputVal = rawVal != null ? String(rawVal) : '';
  }

  const input = el('input');
  input.type = 'text';
  input.className = 'edit-input';
  input.value = inputVal;

  const saveBtn   = el('button', 'save-btn', '✓');
  const cancelBtn = el('button', 'cancel-btn', '✗');

  const origContent = wrap.innerHTML;
  wrap.innerHTML = '';
  wrap.append(input, saveBtn, cancelBtn);
  input.focus();
  input.select();

  const doSave = async () => {
    let newVal = input.value.trim().replace(',', '.');
    if (type === 'number' || type === 'pct') {
      newVal = parseFloat(newVal);
      if (isNaN(newVal)) { input.style.borderColor = 'var(--red)'; return; }
      if (type === 'pct') newVal = newVal / 100;
    }
    try {
      setDeep(S.data[passoN - 1], path, newVal);
      await savePasso(S.ticker, passoN);
      wrap.innerHTML = origContent;
      const newDisplay = wrap.querySelector('.ev');
      if (newDisplay) {
        const fmt = type === 'pct' ? fPct2 : type === 'number' ? fM : String;
        newDisplay.textContent = fmt(newVal);
      }
      wrap.classList.add('saved');
      setTimeout(() => wrap.classList.remove('saved'), 1200);
      refreshHero();
      attachEditListeners();
    } catch {
      wrap.innerHTML = origContent;
      wrap.classList.add('error');
      setTimeout(() => wrap.classList.remove('error'), 1200);
      attachEditListeners();
    }
  };

  const doCancel = () => {
    wrap.innerHTML = origContent;
    attachEditListeners();
  };

  saveBtn.addEventListener('click', doSave);
  cancelBtn.addEventListener('click', doCancel);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); doSave(); }
    if (e.key === 'Escape') { e.preventDefault(); doCancel(); }
  });
}

// ─── Breadcrumb ──────────────────────────────────────────────────────────────
function setBreadcrumb(ticker) {
  const bc = document.getElementById('breadcrumb');
  if (!ticker) {
    bc.innerHTML = '';
    return;
  }
  bc.innerHTML = `
    <a class="back-link" href="#">← Empresas</a>
    <span class="bc-sep">/</span>
    <span class="bc-current">${ticker}</span>
  `;
}
